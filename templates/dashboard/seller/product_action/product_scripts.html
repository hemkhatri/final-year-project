<!-- Dynamic Injection Setup Node for Script Block Handling -->
{{ IMGBB_API_KEY|json_script:"imgbb-key-data" }}
{{ category_tree_json|json_script:"category-tree-data" }}

<script>
document.addEventListener("DOMContentLoaded", function() {
    // ==========================================
    // 1. MEDIA GALLERY ATTACHMENT LOGIC
    // ==========================================
    let attachedMedia = [];

    const keyDataElement = document.getElementById('imgbb-key-data');
    const IMGBB_API_KEY = keyDataElement ? JSON.parse(keyDataElement.textContent) : '';

    const imgbbPicker = document.getElementById('imgbbPicker');
    const uploadStatus = document.getElementById('uploadStatus');
    const ytUrlInput = document.getElementById('ytUrlInput');
    const addVideoBtn = document.getElementById('addVideoBtn');
    const mediaPreviewGrid = document.getElementById('mediaPreviewGrid');
    const hiddenPayloadInput = document.getElementById('id_media_payload');
    const assetCounter = document.getElementById('assetCounter');
    const videoStatusCounter = document.getElementById('videoStatusCounter');

    function getYouTubeEmbedId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function syncStateToHiddenInput() {
        if(hiddenPayloadInput) {
            hiddenPayloadInput.value = JSON.stringify(attachedMedia);
        }
        const videosCount = attachedMedia.filter(m => m.type === 'VIDEO').length;
        if(assetCounter) assetCounter.innerText = `Assets Linked: ${attachedMedia.length} / 10`;
        if(videoStatusCounter) videoStatusCounter.innerText = `Videos: ${videosCount} / 1`;
    }

    function renderMediaGalleryPreviews() {
        if(!mediaPreviewGrid) return;
        mediaPreviewGrid.innerHTML = '';
        if(attachedMedia.length === 0) {
            mediaPreviewGrid.innerHTML = '<span class="text-[11px] text-gray-400 col-span-5 text-center my-auto">No pictures or video content linked.</span>';
            return;
        }

        attachedMedia.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = "relative group w-full aspect-square bg-gray-100 rounded-md border border-gray-200 overflow-hidden shadow-2xs";

            if(item.type === 'IMAGE') {
                container.innerHTML = `<img src="${item.url}" class="w-full h-full object-cover">`;
            } else {
                const embedId = getYouTubeEmbedId(item.url);
                const thumbUrl = embedId ? `https://img.youtube.com/vi/${embedId}/mqdefault.jpg` : '';
                container.innerHTML = `
                    <img src="${thumbUrl}" class="w-full h-full object-cover brightness-75">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">🔴</div>
                `;
            }

            const delBtn = document.createElement('button');
            delBtn.type = "button";
            delBtn.className = "absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white text-xs font-bold cursor-pointer";
            delBtn.innerText = "Remove";
            delBtn.addEventListener('click', () => {
                attachedMedia.splice(index, 1);
                renderMediaGalleryPreviews();
                syncStateToHiddenInput();
            });

            container.appendChild(delBtn);
            mediaPreviewGrid.appendChild(container);
        });
    }

    if(imgbbPicker) {
        imgbbPicker.addEventListener('change', async function() {
            if (!this.files || this.files.length === 0) return;
            const file = this.files[0];

            const maxBytes = 1 * 1024 * 1024;
            if (file.size > maxBytes) {
                uploadStatus.innerHTML = "❌ Rejected! Image file size cannot exceed 1 MB.";
                uploadStatus.style.color = "#EF4444";
                this.value = "";
                return;
            }

            if(attachedMedia.length >= 10) {
                uploadStatus.innerHTML = "❌ Target ceiling reached. Max total 10 uploads combined.";
                uploadStatus.style.color = "#EF4444";
                return;
            }

            uploadStatus.innerHTML = '⏳ Uploading safely to ImgBB storage cloud...';
            uploadStatus.style.color = "#3B82F6";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    uploadStatus.innerHTML = '✅ Cloud Upload Completed Successfully!';
                    uploadStatus.style.color = "#10B981";

                    attachedMedia.push({ type: 'IMAGE', url: result.data.url });
                    renderMediaGalleryPreviews();
                    syncStateToHiddenInput();
                    this.value = "";
                } else {
                    throw new Error();
                }
            } catch (error) {
                uploadStatus.innerHTML = '❌ Cloud Gateway Handshake Failed.';
                uploadStatus.style.color = "#EF4444";
            }
        });
    }

    if(addVideoBtn) {
        addVideoBtn.addEventListener('click', function() {
            const url = ytUrlInput.value.trim();
            if(!url) return;

            const embedId = getYouTubeEmbedId(url);
            if(!embedId) {
                alert("Please input a standard, recognizable YouTube video web link.");
                return;
            }

            const hasVideo = attachedMedia.some(m => m.type === 'VIDEO');
            if(hasVideo) {
                alert("Item quota warning: Only 1 video clip is permitted per item entry.");
                return;
            }

            if(attachedMedia.length >= 10) {
                alert("Maximum items cap reached. Delete something before appending another.");
                return;
            }

            attachedMedia.push({ type: 'VIDEO', url: url });
            renderMediaGalleryPreviews();
            syncStateToHiddenInput();
            ytUrlInput.value = "";
        });
    }

    renderMediaGalleryPreviews();
    syncStateToHiddenInput();

    // ==========================================
    // 2. DYNAMIC CASCADING CATEGORY TREE LOGIC
    // ==========================================
    const categoryTreeDataEl = document.getElementById('category-tree-data');
    const categoryTree = categoryTreeDataEl ? JSON.parse(categoryTreeDataEl.textContent) : [];
    const chainContainer = document.getElementById('categoryChainContainer');
    const finalCategoryInput = document.getElementById('id_category_final');

    function getChildren(parentId) {
        return categoryTree.filter(c => c.parent_id === parentId);
    }

    function buildLevel(parentId, levelIndex) {
        if(chainContainer) {
            Array.from(chainContainer.children).slice(levelIndex).forEach(el => el.remove());
        }

        const children = getChildren(parentId);
        if (children.length === 0) {
            if(finalCategoryInput) finalCategoryInput.value = parentId || '';
            return;
        }

        const select = document.createElement('select');
        select.className = "w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-indigo-600 text-sm mt-2";
        select.innerHTML = `<option value="" disabled selected>Select ${levelIndex === 0 ? 'a category' : 'a subcategory'}</option>` +
            children.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

        select.addEventListener('change', function() {
            const chosenId = parseInt(this.value, 10);
            if(finalCategoryInput) finalCategoryInput.value = chosenId;
            buildLevel(chosenId, levelIndex + 1);
        });

        if(chainContainer) chainContainer.appendChild(select);
        if(finalCategoryInput) finalCategoryInput.value = '';
    }

    buildLevel(null, 0);

    window.rebuildCategoryChainForExisting = function(existingCategoryId) {
        if (!existingCategoryId) { buildLevel(null, 0); return; }

        const path = [];
        let current = categoryTree.find(c => c.id === parseInt(existingCategoryId, 10));
        while (current) {
            path.unshift(current);
            current = current.parent_id ? categoryTree.find(c => c.id === current.parent_id) : null;
        }

        if(chainContainer) chainContainer.innerHTML = '';
        let parentId = null;
        path.forEach((node, idx) => {
            buildLevel(parentId, idx);
            const select = chainContainer.children[idx];
            if(select) select.value = node.id;
            parentId = node.id;
        });
        
        buildLevel(parentId, path.length);
        if(finalCategoryInput) finalCategoryInput.value = parentId;
    };
});
</script>
