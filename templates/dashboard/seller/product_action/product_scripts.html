<!-- Dynamic Injection Setup Node for Script Block Handling -->
{{ IMGBB_API_KEY|json_script:"imgbb-key-data" }}
{{ category_tree_json|json_script:"category-tree-data" }}

<script>
function initProductFormScripts() {
    // ==========================================
    // 1. MEDIA GALLERY ATTACHMENT LOGIC
    // ==========================================
    let attachedMedia = [];

    const keyDataElement = document.getElementById('imgbb-key-data');
    const IMGBB_API_KEY = keyDataElement ? JSON.parse(keyDataElement.textContent) : '';

    const imgbbPicker = document.getElementById('imgbbPicker');
    const uploadStatus = document.getElementById('uploadStatus');
    const ytUrlInput = document.getElementById('ytUrlInput');
    const addVideoBtn = document.getElementById('addVideoBtn');
    const mediaPreviewGrid = document.getElementById('mediaPreviewGrid');
    const hiddenPayloadInput = document.getElementById('id_media_payload');
    const assetCounter = document.getElementById('assetCounter');
    const videoStatusCounter = document.getElementById('videoStatusCounter');

    // Bail out early if form elements are not present in DOM
    if (!mediaPreviewGrid && !imgbbPicker && !document.getElementById('categoryChainContainer')) {
        return;
    }

    function getYouTubeEmbedId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function syncStateToHiddenInput() {
        if (hiddenPayloadInput) {
            hiddenPayloadInput.value = JSON.stringify(attachedMedia);
        }
        const videosCount = attachedMedia.filter(m => m.type === 'VIDEO').length;
        if (assetCounter) assetCounter.innerText = `Assets Linked: ${attachedMedia.length} / 10`;
        if (videoStatusCounter) videoStatusCounter.innerText = `Videos: ${videosCount} / 1`;
    }

    function renderMediaGalleryPreviews() {
        if (!mediaPreviewGrid) return;
        mediaPreviewGrid.innerHTML = '';
        if (attachedMedia.length === 0) {
            mediaPreviewGrid.innerHTML = '<span class="text-[11px] text-gray-400 col-span-5 text-center my-auto">No pictures or video content linked.</span>';
            return;
        }

        attachedMedia.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = "relative group w-full aspect-square bg-gray-100 rounded-md border border-gray-200 overflow-hidden shadow-2xs";

            if (item.type === 'IMAGE') {
                container.innerHTML = `<img src="${item.url}" class="w-full h-full object-cover">`;
            } else {
                const embedId = getYouTubeEmbedId(item.url);
                const thumbUrl = embedId ? `https://img.youtube.com/vi/${embedId}/mqdefault.jpg` : '';
                container.innerHTML = `
                    <img src="${thumbUrl}" class="w-full h-full object-cover brightness-75">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">🔴</div>
                `;
            }

            const delBtn = document.createElement('button');
            delBtn.type = "button";
            delBtn.className = "absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white text-xs font-bold cursor-pointer";
            delBtn.innerText = "Remove";
            delBtn.addEventListener('click', () => {
                attachedMedia.splice(index, 1);
                renderMediaGalleryPreviews();
                syncStateToHiddenInput();
            });

            container.appendChild(delBtn);
            mediaPreviewGrid.appendChild(container);
        });
    }

    if (imgbbPicker) {
        imgbbPicker.addEventListener('change', async function() {
            if (!this.files || this.files.length === 0) return;
            const file = this.files[0];

            const maxBytes = 1 * 1024 * 1024; // 1 MB limit
            if (file.size > maxBytes) {
                uploadStatus.innerHTML = "❌ Rejected! Image file size cannot exceed 1 MB.";
                uploadStatus.style.color = "#EF4444";
                this.value = "";
                return;
            }

            if (attachedMedia.length >= 10) {
                uploadStatus.innerHTML = "❌ Target ceiling reached. Max total 10 uploads combined.";
                uploadStatus.style.color = "#EF4444";
                return;
            }

            uploadStatus.innerHTML = '⏳ Uploading safely to ImgBB storage cloud...';
            uploadStatus.style.color = "#3B82F6";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    uploadStatus.innerHTML = '✅ Cloud Upload Completed Successfully!';
                    uploadStatus.style.color = "#10B981";

                    attachedMedia.push({ type: 'IMAGE', url: result.data.url });
                    renderMediaGalleryPreviews();
                    syncStateToHiddenInput();
                    this.value = "";
                } else {
                    throw new Error();
                }
            } catch (error) {
                uploadStatus.innerHTML = '❌ Cloud Gateway Handshake Failed.';
                uploadStatus.style.color = "#EF4444";
            }
        });
    }

    if (addVideoBtn) {
        addVideoBtn.addEventListener('click', function() {
            const url = ytUrlInput.value.trim();
            if (!url) return;

            const embedId = getYouTubeEmbedId(url);
            if (!embedId) {
                alert("Please input a standard, recognizable YouTube video web link.");
                return;
            }

            const hasVideo = attachedMedia.some(m => m.type === 'VIDEO');
            if (hasVideo) {
                alert("Item quota warning: Only 1 video clip is permitted per item entry.");
                return;
            }

            if (attachedMedia.length >= 10) {
                alert("Maximum items cap reached. Delete something before appending another.");
                return;
            }

            attachedMedia.push({ type: 'VIDEO', url: url });
            renderMediaGalleryPreviews();
            syncStateToHiddenInput();
            ytUrlInput.value = "";
        });
    }

    renderMediaGalleryPreviews();
    syncStateToHiddenInput();

    // ==========================================
    // 2. DYNAMIC CATEGORY & FILTER SCHEMA LOGIC
    // ==========================================
    const categoryTreeDataEl = document.getElementById('category-tree-data');
    const categoryTree = categoryTreeDataEl ? JSON.parse(categoryTreeDataEl.textContent) : [];
    const chainContainer = document.getElementById('categoryChainContainer');
    const finalCategoryInput = document.getElementById('id_category_final');

    /**
     * Traverses from root parent category down to chosen child category.
     * Merges parent and child filter schemas together so child overrides parent.
     */
    function getMergedCategorySchema(categoryId) {
        if (!categoryId) return {};

        const categoryChain = [];
        let current = categoryTree.find(c => c.id === parseInt(categoryId, 10));

        // Build chain from child up to root parent
        while (current) {
            categoryChain.unshift(current); // Place parent first, child last
            current = current.parent_id ? categoryTree.find(c => c.id === current.parent_id) : null;
        }

        let finalSchema = {};
        categoryChain.forEach(cat => {
            let schema = cat.filter_schema;
            if (typeof schema === 'string') {
                try { schema = JSON.parse(schema); } catch (e) { schema = {}; }
            }
            if (schema && typeof schema === 'object') {
                finalSchema = { ...finalSchema, ...schema };
            }
        });

        return finalSchema;
    }

    /**
     * Reads all rendered inputs/checkboxes and packs them into JSON string inside #id_attributes_payload
     */
    window.syncAttributesPayload = function() {
        const filterFieldsArea = document.getElementById('dynamicFieldsArea');
        const hiddenAttributesPayload = document.getElementById('id_attributes_payload');

        if (!filterFieldsArea || !hiddenAttributesPayload) return;

        const payload = {};
        const inputs = filterFieldsArea.querySelectorAll('.dynamic-attr-input');

        inputs.forEach(input => {
            const key = input.dataset.attrKey;
            if (!key) return;

            if (input.type === 'checkbox') {
                if (input.checked) {
                    if (!payload[key]) payload[key] = [];
                    payload[key].push(input.value);
                }
            } else if (input.value.trim() !== '') {
                payload[key] = input.value.trim();
            }
        });

        hiddenAttributesPayload.value = JSON.stringify(payload);
    };

    /**
     * Renders controls based on merged category schema:
     * - Array with 2+ items -> Checkboxes
     * - Array with 0-1 items, null, "", or plain string -> Textbox
     */
    function renderDynamicFilters(categoryId, existingValues = {}) {
        const filterContainer = document.getElementById('dynamicFiltersContainer');
        const filterFieldsArea = document.getElementById('dynamicFieldsArea');

        if (!filterContainer || !filterFieldsArea) return;

        filterFieldsArea.innerHTML = '';
        const schema = getMergedCategorySchema(categoryId);

        if (!schema || Object.keys(schema).length === 0) {
            filterContainer.classList.add('hidden');
            const hiddenAttributesPayload = document.getElementById('id_attributes_payload');
            if (hiddenAttributesPayload) hiddenAttributesPayload.value = '{}';
            return;
        }

        filterContainer.classList.remove('hidden');

        Object.entries(schema).forEach(([key, schemaValue]) => {
            const fieldWrapper = document.createElement('div');
            fieldWrapper.className = 'bg-white p-3 rounded-lg border border-gray-200 shadow-2xs space-y-2';

            const formattedLabel = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            const currentValue = existingValues[key];

            // RULE 1: ARRAY WITH 2+ OPTIONS -> CHECKBOXES
            if (Array.isArray(schemaValue) && schemaValue.length > 1) {
                const selectedArr = Array.isArray(currentValue) ? currentValue : [];

                fieldWrapper.innerHTML = `
                    <label class="block text-xs font-bold text-gray-700">${formattedLabel}</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 pt-1">
                        ${schemaValue.map(option => {
                            const isChecked = selectedArr.includes(option) ? 'checked' : '';
                            return `
                                <label class="inline-flex items-center text-xs text-gray-600 bg-gray-50 px-2.5 py-1.5 rounded border border-gray-200 hover:bg-indigo-50 cursor-pointer transition">
                                    <input type="checkbox" 
                                           data-attr-key="${key}" 
                                           data-schema-type="array" 
                                           value="${option}" 
                                           ${isChecked}
                                           class="dynamic-attr-input rounded text-indigo-600 focus:ring-indigo-500 mr-2" 
                                           onchange="syncAttributesPayload()">
                                    <span>${option}</span>
                                </label>
                            `;
                        }).join('')}
                    </div>
                `;
            } 
            // RULE 2: ARRAY WITH 0-1 ITEMS, NULL, "", OR STRING -> TEXT INPUT
            else {
                let textVal = '';
                if (typeof currentValue === 'string') {
                    textVal = currentValue;
                } else if (Array.isArray(currentValue) && currentValue.length > 0) {
                    textVal = currentValue[0];
                }

                // If the schema itself supplies exactly one option, use it as a placeholder hint
                const singleOptionHint = (Array.isArray(schemaValue) && schemaValue.length === 1)
                    ? schemaValue[0]
                    : `Enter ${formattedLabel.toLowerCase()}...`;

                fieldWrapper.innerHTML = `
                    <label class="block text-xs font-bold text-gray-700 mb-1">${formattedLabel}</label>
                    <input type="text" 
                           data-attr-key="${key}" 
                           data-schema-type="text" 
                           value="${textVal}"
                           class="dynamic-attr-input w-full px-3 py-1.5 text-xs border border-gray-300 rounded-md focus:outline-indigo-600" 
                           placeholder="${singleOptionHint}" 
                           oninput="syncAttributesPayload()">
                `;
            }

            filterFieldsArea.appendChild(fieldWrapper);
        });

        syncAttributesPayload();
    }

    function getChildren(parentId) {
        return categoryTree.filter(c => c.parent_id === parentId);
    }

    function buildLevel(parentId, levelIndex, existingAttributes = {}) {
        if (chainContainer) {
            Array.from(chainContainer.children).slice(levelIndex).forEach(el => el.remove());
        }

        const children = getChildren(parentId);

        if (children.length === 0) {
            if (finalCategoryInput) finalCategoryInput.value = parentId || '';
            renderDynamicFilters(parentId, existingAttributes);
            return;
        }

        const select = document.createElement('select');
        select.className = "w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-indigo-600 text-sm mt-2";
        select.innerHTML = `<option value="" disabled selected>Select ${levelIndex === 0 ? 'a category' : 'a subcategory'}</option>` +
            children.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

        select.addEventListener('change', function() {
            const chosenId = parseInt(this.value, 10);
            if (finalCategoryInput) finalCategoryInput.value = chosenId;
            buildLevel(chosenId, levelIndex + 1, existingAttributes);
        });

        if (chainContainer) chainContainer.appendChild(select);
        if (finalCategoryInput) finalCategoryInput.value = '';

        // Render current level schema if user hasn't selected a deeper level yet
        renderDynamicFilters(parentId, existingAttributes);
    }

    // Initialize root category chain
    buildLevel(null, 0);

    /**
     * Called when editing an existing product. Rebuilds cascading dropdowns and pre-populates values.
     */
    window.rebuildCategoryChainForExisting = function(existingCategoryId, existingAttributes = {}) {
        if (!existingCategoryId) { 
            buildLevel(null, 0); 
            return; 
        }

        const path = [];
        let current = categoryTree.find(c => c.id === parseInt(existingCategoryId, 10));
        while (current) {
            path.unshift(current);
            current = current.parent_id ? categoryTree.find(c => c.id === current.parent_id) : null;
        }

        if (chainContainer) chainContainer.innerHTML = '';
        let parentId = null;

        path.forEach((node, idx) => {
            buildLevel(parentId, idx, existingAttributes);
            const select = chainContainer.children[idx];
            if (select) select.value = node.id;
            parentId = node.id;
        });

        buildLevel(parentId, path.length, existingAttributes);
        if (finalCategoryInput) finalCategoryInput.value = parentId;
        renderDynamicFilters(parentId, existingAttributes);
    };
}

// Execute immediately if DOM is ready, or hook to DOMContentLoaded
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initProductFormScripts);
} else {
    initProductFormScripts();
}
</script>
