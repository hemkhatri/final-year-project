<!-- ================= 2. MY PRODUCTS (THE INVENTORY & CREATION FORM) ================= -->
<div x-show="currentTab === 'products'"
     x-data="{
        viewState: 'list',
        editingProductId: null,

        deleteModalOpen: false,
        deleteTargetId: null,
        deleteTargetName: '',
        deletePassword: '',
        deleteError: '',
        deleting: false,
        formSubmitting: false,
        formError: '',
        savingRowId: null,

        // Safely reads the CSRF token. Returns null instead of throwing
        // if the meta tag is missing, so callers can handle it gracefully
        // instead of hanging forever.
        getCsrfToken() {
            const meta = document.querySelector('meta[name=csrf-token]');
            if (!meta || !meta.content) {
                console.error('CSRF meta tag (name=csrf-token) not found on page.');
                return null;
            }
            return meta.content;
        },

        openDeleteModal(id, name) {
            this.deleteTargetId = id;
            this.deleteTargetName = name;
            this.deletePassword = '';
            this.deleteError = '';
            this.deleteModalOpen = true;
        },

        async confirmDelete() {
            if (!this.deletePassword) { this.deleteError = 'Please enter your password.'; return; }

            const token = this.getCsrfToken();
            if (!token) {
                this.deleteError = 'Security token missing from page — please refresh and try again.';
                return;
            }

            this.deleting = true;
            this.deleteError = '';

            try {
                const res = await fetch(`/shop/dashboard/seller/products/${this.deleteTargetId}/delete/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': token
                    },
                    body: JSON.stringify({ password: this.deletePassword })
                });

                if (!res.ok) {
                    console.error('Delete request failed with status', res.status);
                    this.deleteError = `Server error (${res.status}). Check console/network tab.`;
                    return;
                }

                const data = await res.json();
                if (data.success) {
                    document.getElementById(`product-row-${this.deleteTargetId}`)?.remove();
                    this.deleteModalOpen = false;
                } else {
                    this.deleteError = data.error || 'Delete failed.';
                }
            } catch (err) {
                console.error('confirmDelete error:', err);
                this.deleteError = 'Network or parsing error. Check console for details.';
            } finally {
                this.deleting = false;
            }
        },

        async saveInlineRow(id, name, price, stock) {
            const token = this.getCsrfToken();
            if (!token) {
                alert('Security token missing from page — please refresh and try again.');
                return;
            }

            this.savingRowId = id;
            try {
                const res = await fetch(`/shop/dashboard/seller/products/${id}/update/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': token
                    },
                    body: JSON.stringify({ name: name, price: price, stock: stock })
                });

                if (!res.ok) {
                    console.error('Update request failed with status', res.status);
                    alert(`Server error (${res.status}). Check console/network tab.`);
                    return;
                }

                const data = await res.json();
                if (!data.success) {
                    alert(data.error || 'Update failed.');
                }
            } catch (err) {
                console.error('saveInlineRow error:', err);
                alert('Network or parsing error while saving. Check console for details.');
            } finally {
                this.savingRowId = null;
            }
        },

        openEditForm(product) {
            this.editingProductId = product.id;
            this.viewState = 'create';
            this.$nextTick(() => {
                const form = document.getElementById('productCreationForm');
                if (!form) { console.error('productCreationForm not found in DOM.'); return; }
                form.querySelector('[name=name]').value = product.name;
                form.querySelector('[name=description]').value = product.description;
                form.querySelector('[name=price]').value = product.price;
                form.querySelector('[name=stock]').value = product.stock;

                const relevantTagsInput = form.querySelector('[name=relevant_tags]');
                if (relevantTagsInput) { relevantTagsInput.value = product.relevant_tags || ''; }

                if (window.rebuildCategoryChainForExisting) {
                    window.rebuildCategoryChainForExisting(product.category_id);
                } else {
                    console.error('window.rebuildCategoryChainForExisting is not defined — product_scripts.html may not have loaded/run.');
                }
            });
        },

        async submitCreateForm() {
            const form = document.getElementById('productCreationForm');
            if (!form) { console.error('productCreationForm not found in DOM.'); return; }

            const token = this.getCsrfToken();
            if (!token) {
                this.formError = 'Security token missing from page — please refresh and try again.';
                return;
            }

            const formData = new FormData(form);
            this.formSubmitting = true;
            this.formError = '';

            try {
                let res;
                if (this.editingProductId) {
                    const payload = {
                        name: formData.get('name'),
                        description: formData.get('description'),
                        price: formData.get('price'),
                        stock: formData.get('stock'),
                        category: formData.get('category'),
                        relevant_tags: formData.get('relevant_tags') || '',
                        attributes_payload: formData.get('attributes_payload') || '{}',   // <-- ADD THIS LINE
                        media_payload: formData.get('media_payload') || '[]'
                    };
                    res = await fetch(`/shop/dashboard/seller/products/${this.editingProductId}/update/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': token
                        },
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch('/shop/dashboard/seller/products/create-ajax/', {
                        method: 'POST',
                        headers: { 'X-CSRFToken': token },
                        body: formData
                    });
                }

                if (!res.ok) {
                    console.error('Form submit failed with status', res.status);
                    this.formError = `Server error (${res.status}). Check console/network tab.`;
                    return;
                }

                const data = await res.json();
                if (data.success) {
                    if (this.editingProductId) {
                        this.editingProductId = null;
                    } else {
                        form.reset();
                    }
                    this.viewState = 'list';
                    window.location.reload();
                } else {
                    this.formError = data.error || (this.editingProductId ? 'Failed to update product.' : 'Failed to create product.');
                }
            } catch (err) {
                console.error('submitCreateForm error:', err);
                this.formError = 'Network or parsing error. Check console for details.';
            } finally {
                this.formSubmitting = false;
            }
        }
     }"
     class="bg-white rounded-xl shadow-xs border border-gray-200 p-6" x-transition>

    <!-- Sub-Task Modules -->
    {% include "dashboard/seller/product_action/product_list.html" %}
    {% include "dashboard/seller/product_action/product_form.html" %}

    <!-- ================= DELETE CONFIRMATION MODAL ================= -->
    <div x-show="deleteModalOpen" x-cloak
         class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4"
         @keydown.escape.window="deleteModalOpen = false">
        <div class="bg-white rounded-xl shadow-lg max-w-sm w-full p-6 space-y-4" @click.outside="deleteModalOpen = false">
            <h3 class="text-base font-bold text-gray-900">Delete <span x-text="deleteTargetName"></span>?</h3>
            <p class="text-sm text-gray-500">This action is permanent. Confirm your account password to continue.</p>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Your Password</label>
                <input type="password" x-model="deletePassword" @keydown.enter="confirmDelete()"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-hidden focus:border-indigo-500"
                       placeholder="Enter password to confirm">
            </div>
            <p x-show="deleteError" x-text="deleteError" class="text-xs text-rose-600 font-semibold"></p>
            <div class="flex gap-3 pt-2">
                <button @click="deleteModalOpen = false" class="flex-1 bg-gray-100 text-gray-700 font-semibold py-2 rounded-lg hover:bg-gray-200 transition cursor-pointer">Cancel</button>
                <button @click="confirmDelete()" :disabled="deleting" class="flex-1 bg-rose-600 text-white font-semibold py-2 rounded-lg hover:bg-rose-500 transition disabled:opacity-50 cursor-pointer">
                    <span x-text="deleting ? 'Deleting...' : 'Yes, Delete'"></span>
                </button>
            </div>
        </div>
    </div>
</div>

{% include "dashboard/seller/product_action/product_scripts.html" %}
