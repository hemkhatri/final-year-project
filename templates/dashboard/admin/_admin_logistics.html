<!-- templates/dashboard/admin/_admin_logistics.html -->
<div x-show="currentTab === 'logistics'" x-data="{ fleetFilter: 'route' }" class="p-6 space-y-6">
    <div>
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Delivery & Logistics Hub</h2>
        <p class="text-sm text-slate-500">Track active fulfillment coordinates across live maps.</p>
    </div>

    <!-- Live Counter Filters Matrix Tab Group -->
    <div class="flex items-center gap-2 border-b border-slate-200 pb-1">
        <button @click="fleetFilter = 'all'" :class="fleetFilter === 'all' ? 'border-red-600 text-red-700 font-bold' : 'border-transparent text-slate-400'" class="px-4 py-2 border-b-2 text-xs font-semibold tracking-wide cursor-pointer transition">All (1)</button>
        <button @click="fleetFilter = 'route'" :class="fleetFilter === 'route' ? 'border-red-600 text-red-700 font-bold' : 'border-transparent text-slate-400'" class="px-4 py-2 border-b-2 text-xs font-semibold tracking-wide cursor-pointer transition">On Route (1)</button>
        <button @click="fleetFilter = 'idle'" :class="fleetFilter === 'idle' ? 'border-red-600 text-red-700 font-bold' : 'border-transparent text-slate-400'" class="px-4 py-2 border-b-2 text-xs font-semibold tracking-wide cursor-pointer transition">Idle (0)</button>
        <button @click="fleetFilter = 'alert'" :class="fleetFilter === 'alert' ? 'border-red-600 text-red-700 font-bold' : 'border-transparent text-slate-400'" class="px-4 py-2 border-b-2 text-xs font-semibold tracking-wide cursor-pointer transition">Incidents (0)</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Live GPS Map Simulated Canvas Overlay -->
        <div class="lg:col-span-2 bg-slate-200 h-96 rounded-xl flex items-center justify-center border border-slate-300 relative shadow-inner overflow-hidden">
            
            <!-- Visual Mockup Map Node Rings Pins -->
            <div class="absolute top-1/3 left-1/4 w-4 h-4 bg-red-600 rounded-full border-2 border-white animate-pulse shadow-md"></div>
            <div class="absolute top-1/2 left-2/3 w-4 h-4 bg-blue-600 rounded-full border-2 border-white shadow-md"></div>
            <div class="absolute top-1/4 left-1/2 w-8 h-8 bg-red-600/20 rounded-full border border-red-500 flex items-center justify-center">
                <div class="w-2 h-2 bg-red-600 rounded-full"></div>
            </div>

            <p class="text-xs uppercase tracking-widest text-slate-500 font-bold bg-white/80 backdrop-blur-sm px-4 py-2 rounded-xl border border-slate-200 shadow-sm z-10">
                🛰️ Live GPS Fleet Stream Syncing...
            </p>
        </div>

        <!-- Rider Feeds Fleet Board Panel Box -->
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
            <h3 class="text-xs uppercase font-black tracking-wider text-slate-400">Fleet Status Board</h3>
            
            <div class="space-y-3">
                <div class="p-4 bg-slate-50 rounded-xl space-y-2 border border-slate-100">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-sm text-slate-900">Rider #402 (Alex)</span>
                        <!-- Orange Capsule Indicator Badge -->
                        <span class="px-2.5 py-0.5 text-[10px] font-bold bg-amber-100 text-amber-800 rounded-full uppercase tracking-wide">On Route</span>
                    </div>
                    <!-- Clean Text Metrics (No thin internal borders) -->
                    <div class="text-xs text-slate-500 space-y-0.5 pt-1">
                        <p>COD Cash On Hand: <strong class="text-slate-900 font-black font-mono">$180.00</strong></p>
                        <p>Incidents Logged: <span class="font-semibold text-slate-700">0 Logs</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
