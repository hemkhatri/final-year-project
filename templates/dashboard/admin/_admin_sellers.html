<!-- templates/dashboard/admin/_admin_sellers.html -->
<div x-show="currentTab === 'sellers'" x-data="{ currentFilter: 'all', search: '' }" class="p-6 space-y-6">
    <div>
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Vendor Governance</h2>
        <p class="text-sm text-slate-500">Monitor merchant scorecards, applications, and escrow files.</p>
    </div>

    <!-- Search & Filter Controls Panel Layout Block -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
        <div class="relative flex-1 max-w-md">
            <input x-model="search" type="text" placeholder="Search merchant storefronts..." 
                   class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 text-xs rounded-lg focus:outline-none focus:border-slate-400 text-slate-700">
            <svg class="w-4 h-4 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        
        <div class="flex items-center gap-1.5 bg-slate-100 p-1 rounded-lg self-start sm:self-auto">
            <button @click="currentFilter = 'all'" :class="currentFilter === 'all' ? 'bg-white font-bold text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-900'" class="px-3 py-1.5 text-xs rounded-md transition cursor-pointer">All Sellers</button>
            <button @click="currentFilter = 'pending'" :class="currentFilter === 'pending' ? 'bg-white font-bold text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-900'" class="px-3 py-1.5 text-xs rounded-md transition cursor-pointer">Pending Approval</button>
            <button @click="currentFilter = 'suspended'" :class="currentFilter === 'suspended' ? 'bg-white font-bold text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-900'" class="px-3 py-1.5 text-xs rounded-md transition cursor-pointer">Suspended</button>
        </div>
    </div>

    <!-- Evenly Distributed Data Table Matrix Grid -->
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <table class="w-full text-left text-xs border-collapse">
            <thead class="bg-slate-50 font-bold uppercase tracking-wider text-slate-400 border-b border-slate-200">
                <tr>
                    <th class="p-4 w-1/4">Storefront Name</th>
                    <th class="p-4 w-1/6 text-center">Health Grade</th>
                    <th class="p-4 w-1/6 text-center">Total Products</th>
                    <th class="p-4 w-1/6 text-center">Account Status</th>
                    <th class="p-4 w-1/6 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 text-slate-700 font-medium">
                <tr class="hover:bg-slate-50/50">
                    <td class="p-4 font-bold text-slate-900">Quantum Core Venturing</td>
                    <!-- Pill Grade Badges Matrix -->
                    <td class="p-4 text-center">
                        <span class="px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-800 font-bold text-[10px]">Grade A</span>
                    </td>
                    <td class="p-4 text-center font-mono font-semibold">142 Items</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-0.5 rounded bg-blue-50 text-blue-700 font-semibold text-[10px] border border-blue-200">Active</span>
                    </td>
                    <!-- Styled Action Button with Icon -->
                    <td class="p-4 text-right">
                        <button class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-lg shadow-sm transition cursor-pointer font-bold">
                            <svg class="w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                            Moderate Store
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
