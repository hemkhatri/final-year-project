{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block body_content %}
<style>
    /* target input boxes rendered by form.as_p */
    .login-form p input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        margin-top: 0.25rem;
        border: 1px solid #d1d5db; /* border-gray-300 */
        border-radius: 0.375rem; /* rounded-md */
        outline: none;
        transition: all 0.2s ease-in-out;
    }
    
    .login-form p input:focus {
        border-color: #6366f1; /* indigo-500 */
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
</style>

<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow-md border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-6 tracking-tight">Log In</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <!-- Added 'login-form' class wrapper -->
        <div class="login-form space-y-3 font-medium text-gray-700">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2.5 px-4 rounded-md shadow-sm hover:bg-indigo-500 transition-colors mt-2">
            Log In
        </button>
    </form>

    <div class="mt-6 pt-4 border-t border-gray-100 text-sm text-center text-gray-600">
        Don't have an account yet? 
        <a href="{% url 'accounts:signup' %}" class="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors ml-1">
            Sign up here
        </a>
    </div>
</div>
{% endblock %}
