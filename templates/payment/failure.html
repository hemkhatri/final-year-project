{% extends 'base.html' %}
{% block title %}Payment Failed{% endblock %}

{% block body_content %}
<div class="max-w-md mx-auto py-16 text-center space-y-4 bg-white p-8 rounded-xl border border-gray-200 shadow-2xs">
    <div class="text-4xl">❌</div>
    <h1 class="text-2xl font-black text-rose-600">Payment Declined</h1>
    <p class="text-sm text-gray-500">Something went wrong or the transaction was canceled. Please check your account details and try again.</p>
    <div class="flex gap-4 justify-center">
        <a href="{% url 'cart:cart_detail' %}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-4 py-2.5 rounded-md transition shadow-xs cursor-pointer">
            Return to Cart
        </a>
    </div>
</div>
{% endblock %}
